{% extends "base.html" %}
{% block title %}GRIT Forgot Password{% endblock %}
{% block content %}
<section class="auth-layout">
    <div>
        <p class="eyebrow">Password help</p>
        <h1>Request jury password reset</h1>
        <p class="muted">Jury leads and jury members can request help here. The core committee resets passwords from the protected portal.</p>
    </div>
    <form class="panel form-stack" method="post">
        <label>Username<input name="username" autocomplete="username" required></label>
        <button class="button" type="submit"><i data-lucide="key-round"></i>Request reset</button>
        <a class="text-button" href="{{ url_for('auth.login') }}">Back to login</a>
    </form>
</section>
{% endblock %}
