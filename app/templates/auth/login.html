{% extends "base.html" %}
{% block title %}GRIT Portal Login{% endblock %}
{% block content %}
<section class="auth-layout">
    <div>
        <p class="eyebrow">Protected portal</p>
        <h1>Core and jury access</h1>
        <p class="muted">Use the account assigned by the committee.</p>
    </div>
    <form class="panel form-stack" method="post">
        <label>Username<input name="username" autocomplete="username" required></label>
        <label>Password<input name="password" type="password" autocomplete="current-password" required></label>
        <button class="button" type="submit"><i data-lucide="log-in"></i>Login</button>
        <a class="text-button" href="{{ url_for('auth.forgot_password') }}">Forgot password?</a>
    </form>
</section>
{% endblock %}
