{% if total > per_page %}
<nav class="pagination">
    {% if page > 1 %}<a href="{{ request.path }}?{{ request.query_string.decode()|replace('page=' ~ page, 'page=' ~ (page - 1)) if 'page=' in request.query_string.decode() else request.query_string.decode() ~ '&page=' ~ (page - 1) }}"><i data-lucide="chevron-left"></i>Previous</a>{% endif %}
    <span>Page {{ page }} of {{ ((total - 1) // per_page) + 1 }}</span>
    {% if page * per_page < total %}<a href="{{ request.path }}?{{ request.query_string.decode()|replace('page=' ~ page, 'page=' ~ (page + 1)) if 'page=' in request.query_string.decode() else request.query_string.decode() ~ '&page=' ~ (page + 1) }}">Next<i data-lucide="chevron-right"></i></a>{% endif %}
</nav>
{% endif %}
